<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save & Return — Clearer Prototype</title>
  <link rel="stylesheet" href="../../_shared/slate-cs24-tokens.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    #root {
      width: 100%;
      max-width: 428px;
      min-height: 100vh;
      position: relative;
    }

    /* Nav tabs */
    .screen-nav {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 428px;
      width: 100%;
      display: flex;
      z-index: 100;
      background: var(--slate-color-surface-primary);
      border-bottom: 1px solid var(--slate-components-cell-row-border-full);
    }
    .screen-nav button {
      flex: 1;
      padding: 0.5rem 0.25rem;
      font: var(--slate-font-mobile-special-caption-bold);
      color: var(--slate-color-content-text-secondary);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .screen-nav button.active {
      color: var(--slate-color-action-text-primary);
      border-bottom-color: var(--slate-color-action-text-primary);
    }
    .screen-nav button:hover {
      background: var(--slate-color-surface-background-primary);
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      font: var(--slate-font-mobile-body-small-bold);
      color: var(--slate-color-content-text-primary);
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      gap: 0.75rem;
    }
    .header-back {
      font: var(--slate-font-mobile-body-default);
      color: var(--slate-color-action-text-primary);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .header-title {
      font: var(--slate-font-mobile-heading-level-4);
      flex: 1;
      text-align: center;
      padding-right: 2rem;
    }

    /* Page content */
    .page-content {
      padding: 0 1rem 10rem 1rem;
      margin-top: 2.25rem;
    }

    .step-label {
      font: var(--slate-font-mobile-special-overline);
      color: var(--slate-color-content-text-secondary);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .page-title {
      font: var(--slate-font-mobile-heading-level-3);
      margin-bottom: 1rem;
    }

    /* Info callout */
    .info-callout {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      border-radius: var(--slate-components-card-callout-border-radius-default);
      background: var(--slate-color-surface-secondary);
      margin-bottom: 1.5rem;
      align-items: flex-start;
    }
    .info-callout .icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--slate-color-action-text-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font: var(--slate-font-mobile-special-caption-bold);
    }
    .info-callout p {
      font: var(--slate-font-mobile-body-small);
      color: var(--slate-color-content-text-secondary);
    }

    /* Debt card */
    .debt-card {

      background: var(--slate-components-card-background-primary);
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .debt-card-header {
      display: flex;
      align-items: center;
      padding: 1rem;
      gap: 0.75rem;
      cursor: pointer;
    }
    .debt-card-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--slate-size-border-radius-medium);
      background: var(--slate-color-surface-background-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font: var(--slate-font-mobile-special-caption-bold);
      color: var(--slate-color-content-text-secondary);
      flex-shrink: 0;
    }
    .debt-card-info {
      flex: 1;
      min-width: 0;
    }
    .debt-card-name {
      font: var(--slate-font-mobile-heading-level-5);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .debt-card-detail {
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-content-text-secondary);
    }
    .debt-type-tag {

      padding: 0.125rem 0.5rem;
      border-radius: var(--slate-components-tag-border-radius);
      background: var(--slate-color-surface-secondary);
      color: var(--slate-color-content-text-secondary);
      white-space: nowrap;
    }
    .debt-card-toggle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--slate-color-surface-background-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--slate-color-action-text-primary);
      font-size: 1.25rem;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    /* Completed debt card */
    .debt-card-completed .debt-card-header {
      opacity: 1;
    }
    .completed-badge {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font: var(--slate-font-mobile-special-caption-bold);
      color: var(--slate-color-positive-text-primary);
      padding: 0 1rem 0.75rem 3.25rem;
    }
    .completed-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--slate-color-positive-surface-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
    }

    /* Needs attention badge */
    .needs-attention-badge {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font: var(--slate-font-mobile-special-caption-bold);
      color: var(--slate-color-warning-text-primary);
      padding: 0 1rem 0.75rem 3.25rem;
    }

    /* Debt card body */
    .debt-card-body {
      padding: 0 1rem 1rem 1rem;
    }
    .field-group {
      margin-bottom: 1rem;
    }
    .field-label {
      font: var(--slate-font-mobile-heading-level-5);
      margin-bottom: 0.25rem;
    }
    .field-description {
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-content-text-secondary);
      margin-bottom: 0.5rem;
    }
    .field-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--slate-components-cell-row-border-full);
      border-radius: var(--slate-size-border-radius-small);
      font: var(--slate-font-mobile-body-default);
      color: var(--slate-color-content-text-primary);
      background: var(--slate-color-surface-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    .field-input:focus {
      border-color: var(--slate-color-action-text-primary);
    }
    .field-input::placeholder {
      color: var(--slate-color-content-text-disabled);
    }
    .field-input-prefix {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .field-input-prefix .prefix {
      padding: 0.75rem;
      padding-right: 0;
      border: 1px solid var(--slate-components-cell-row-border-full);
      border-right: none;
      border-radius: var(--slate-size-border-radius-small) 0 0 var(--slate-size-border-radius-small);
      font: var(--slate-font-mobile-body-default);
      color: var(--slate-color-content-text-secondary);
      background: var(--slate-color-surface-primary);
    }
    .field-input-prefix .field-input {
      border-radius: 0 var(--slate-size-border-radius-small) var(--slate-size-border-radius-small) 0;
    }
    .field-hint {
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-content-text-secondary);
      margin-top: 0.375rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* Settlement callout */
    .settlement-callout {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      border-radius: var(--slate-components-card-callout-border-radius-default);
      background: var(--slate-color-warning-surface-primary);
      margin-bottom: 1rem;
      align-items: flex-start;
    }
    .settlement-callout .icon {
      flex-shrink: 0;
      font-size: 1rem;
    }
    .settlement-callout p {
      font: var(--slate-font-mobile-body-small);
      color: var(--slate-color-content-text-primary);
    }

    /* How to find link */
    .help-link {
      font: var(--slate-font-mobile-body-small-bold);
      color: var(--slate-color-action-text-primary);
      text-decoration: none;
      display: block;
      margin-top: 0.5rem;
    }

    /* Summary bar */
    .summary-bar {
      background: var(--slate-color-surface-primary);
      border-top: 1px solid var(--slate-components-cell-row-border-full);
      padding: 1rem;
      margin: 1.5rem -1rem 0 -1rem;
      border-radius: var(--slate-size-border-radius-medium) var(--slate-size-border-radius-medium) 0 0;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.375rem 0;
    }
    .summary-label {
      font: var(--slate-font-mobile-body-small);
      color: var(--slate-color-content-text-secondary);
    }
    .summary-value {
      font: var(--slate-font-mobile-body-small-bold);
    }
    .summary-row-total {
      border-top: 1px solid var(--slate-components-cell-row-border-full);
      margin-top: 0.5rem;
      padding-top: 0.75rem;
    }
    .summary-row-total .summary-label {
      font: var(--slate-font-mobile-body-bold);
      color: var(--slate-color-content-text-primary);
    }
    .summary-row-total .summary-value {
      font: var(--slate-font-mobile-heading-level-3);
    }

    /* Sticky footer */
    .sticky-footer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 428px;
      width: 100%;
      background: var(--slate-color-surface-primary);
      box-shadow: var(--slate-components-sticky-container-shadow-bottom);
      padding: 1rem;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* Bottom sheet overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeOverlay 0.2s ease-out;
    }
    @keyframes fadeOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .bottom-sheet {
      max-width: 428px;
      width: 100%;
      background: var(--slate-color-surface-primary);
      border-radius: var(--slate-size-border-radius-2xlarge) var(--slate-size-border-radius-2xlarge) 0 0;
      padding: 1.5rem;
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .sheet-handle {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--slate-color-content-text-disabled);
      margin: 0 auto 1.5rem auto;
    }
    .sheet-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--slate-color-positive-surface-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1rem auto;
    }
    .sheet-title {
      font: var(--slate-font-mobile-heading-level-3);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .sheet-body {
      font: var(--slate-font-mobile-body-default);
      color: var(--slate-color-content-text-secondary);
      text-align: center;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .sheet-detail {
      background: var(--slate-color-surface-background-primary);
      border-radius: var(--slate-size-border-radius-medium);
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .sheet-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.375rem 0;
    }
    .sheet-detail-label {
      font: var(--slate-font-mobile-body-small);
      color: var(--slate-color-content-text-secondary);
    }
    .sheet-detail-value {
      font: var(--slate-font-mobile-body-small-bold);
    }

    /* Homepage styles */
    .home-hero {
      background: linear-gradient(135deg, hsl(203 55% 13%) 0%, hsl(184 36% 24%) 100%);
      padding: 3.5rem 1.5rem 2rem 1.5rem;
      text-align: center;
      border-radius: 0 0 var(--slate-size-border-radius-2xlarge) var(--slate-size-border-radius-2xlarge);
    }
    .home-greeting {
      font: var(--slate-font-mobile-body-default);
      color: var(--slate-color-content-text-inverted-secondary);
      margin-bottom: 0.25rem;
    }
    .home-name {
      font: var(--slate-font-mobile-hero-level-5);
      color: var(--slate-color-content-text-inverted-primary);
      margin-bottom: 1.5rem;
    }
    .score-ring {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 6px solid hsl(172 80% 40%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem auto;
    }
    .score-number {
      font: var(--slate-font-mobile-hero-level-5);
      color: var(--slate-color-content-text-inverted-primary);
      font-size: 3rem;
    }

    .home-section {
      padding: 1.5rem 1rem 0 1rem;
    }
    .home-section-title {
      font: var(--slate-font-mobile-heading-level-3);
      margin-bottom: 0.25rem;
    }
    .home-section-subtitle {
      font: var(--slate-font-mobile-body-small);
      color: var(--slate-color-content-text-secondary);
      margin-bottom: 1rem;
    }

    /* Resume card — redesigned */
    .resume-card {
      border-radius: var(--slate-components-card-border-radius-default);
      background: var(--slate-components-card-background-primary);
      box-shadow: var(--slate-components-card-shadow-interactive);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .resume-card:hover {
      box-shadow: var(--slate-shadow-large);
    }
    .resume-card-hero {
      background: linear-gradient(135deg, hsl(184 36% 24%) 0%, hsl(203 55% 13%) 100%);
      padding: 1.25rem 1rem;
      position: relative;
    }
    .resume-card-hero-label {
      font: var(--slate-font-mobile-special-overline);
      color: var(--slate-color-content-text-inverted-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.375rem;
    }
    .resume-card-hero-title {
      font: var(--slate-font-mobile-heading-level-3);
      color: var(--slate-color-content-text-inverted-primary);
      margin-bottom: 0.125rem;
    }
    .resume-card-hero-subtitle {
      font: var(--slate-font-mobile-body-small);
      color: var(--slate-color-content-text-inverted-secondary);
    }
    .resume-card-body {
      padding: 1rem;
    }
    .resume-stat-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .resume-stat {
      flex: 1;
      background: var(--slate-color-surface-background-primary);
      border-radius: var(--slate-size-border-radius-medium);
      padding: 0.75rem;
      text-align: center;
    }
    .resume-stat-value {
      font: var(--slate-font-mobile-heading-level-3);
      color: var(--slate-color-content-text-primary);
      margin-bottom: 0.125rem;
    }
    .resume-stat-label {
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-content-text-secondary);
    }
    .resume-debts-list {
      margin-bottom: 1rem;
    }
    .resume-debt-row {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.5rem 0;
      border-bottom: 0.5px solid var(--slate-components-cell-row-border-full);
    }
    .resume-debt-row:last-child {
      border-bottom: none;
    }
    .resume-debt-status {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.625rem;
      flex-shrink: 0;
    }
    .resume-debt-status-done {
      background: var(--slate-color-positive-surface-primary);
      color: var(--slate-color-positive-text-primary);
    }
    .resume-debt-status-pending {
      background: var(--slate-color-warning-surface-primary);
      color: var(--slate-color-warning-text-primary);
    }
    .resume-debt-info {
      flex: 1;
      min-width: 0;
    }
    .resume-debt-name {
      font: var(--slate-font-mobile-body-small-bold);
    }
    .resume-debt-type {
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-content-text-secondary);
    }
    .resume-debt-amount {
      font: var(--slate-font-mobile-body-small-bold);
      text-align: right;
    }
    .resume-debt-amount-pending {
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-warning-text-primary);
      text-align: right;
    }
    .resume-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.5rem;
      margin-bottom: 1rem;
    }
    .resume-card-expiry {
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-content-text-secondary);
    }
    .resume-card-timer {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font: var(--slate-font-mobile-special-caption-bold);
      color: var(--slate-color-warning-text-primary);
    }

    /* Offer card (existing pattern) */
    .offer-card {
      border-radius: var(--slate-components-card-border-radius-default);
      background: var(--slate-components-card-background-primary);
      padding: 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .offer-card-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--slate-size-border-radius-medium);
      background: var(--slate-color-surface-background-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font: var(--slate-font-mobile-special-caption-bold);
      color: var(--slate-color-content-text-secondary);
      flex-shrink: 0;
    }
    .offer-card-info { flex: 1; }
    .offer-card-name {
      font: var(--slate-font-mobile-body-small-bold);
    }
    .offer-card-detail {
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-content-text-secondary);
    }

    /* Tab bar */
    .tab-bar {
      display: flex;
      justify-content: space-around;
      padding: 0.5rem 0;
      border-top: 1px solid var(--slate-components-cell-row-border-full);
      background: var(--slate-color-surface-primary);
      margin-top: 2rem;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.125rem;
      font: var(--slate-font-mobile-special-caption);
      color: var(--slate-color-content-text-secondary);
    }
    .tab-item.active {
      color: var(--slate-color-action-text-primary);
    }

    /* Prototype label */
    .proto-label {
      position: fixed;
      top: 2.5rem;
      right: 0.5rem;
      z-index: 300;
      background: hsl(330 39% 39%);
      color: white;
      font: var(--slate-font-mobile-special-caption-bold);
      padding: 0.25rem 0.5rem;
      border-radius: var(--slate-components-tag-border-radius);
      opacity: 0.85;
    }
  </style>
</head>

    // ─── Debt Card Component ───────────────────────────────

    // ─── App ───────────────────────────────────────────────
    function App() {
      const screens = [
        { id: 'add-details', label: '1. Add Details' },
        { id: 'save-confirm', label: '2. Save' },
        { id: 'homepage', label: '3. Homepage' },
        { id: 'return', label: '4. Return' }
      ];
      const [currentScreen, setCurrentScreen] = useState('add-details');
      const [showSheet, setShowSheet] = useState(false);

      return (
        <>
          <div className="proto-label">PROTOTYPE</div>
          <div className="screen-nav">
            {screens.map(s => (
              <button
                key={s.id}
                className={currentScreen === s.id ? 'active' : ''}
                onClick={() => {
                  setCurrentScreen(s.id);
                  setShowSheet(s.id === 'save-confirm');
                }}
              >
                {s.label}
              </button>
            ))}
          </div>

          {currentScreen === 'add-details' && (
            <AddDebtDetailsScreen
              onSave={() => {
                setShowSheet(true);
                setCurrentScreen('save-confirm');
              }}
              isReturn={false}
            />
          )}

          {currentScreen === 'save-confirm' && (
            <>
              <AddDebtDetailsScreen onSave={() => setShowSheet(true)} isReturn={false} />
              {showSheet && (
                <SaveConfirmationSheet
                  onClose={() => {
                    setShowSheet(false);
                    setCurrentScreen('add-details');
                  }}
                  onGoHome={() => {
                    setShowSheet(false);
                    setCurrentScreen('homepage');
                  }}
                />
              )}
            </>
          )}

          {currentScreen === 'homepage' && (
            <HomepageScreen
              onResume={() => setCurrentScreen('return')}
            />
          )}

          {currentScreen === 'return' && (
            <AddDebtDetailsScreen
              onSave={() => {
                setShowSheet(true);
                setCurrentScreen('save-confirm');
              }}
              isReturn={true}
            />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
